name: Weekly fetch-jobs

on:
  schedule:
    - cron: '0 9 * * 1'  # 毎週月曜 09:00 UTC

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node scripts/fetch-jobs.js
